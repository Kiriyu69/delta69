name: TNT SPORTS

on:
  schedule:
    - cron: "0 */6 * * *"   # Setiap 6 jam
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update_m3u8:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Run update.py
        run: python update.py

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add tnts1.m3u8 tnts2.m3u8 tnts3.m3u8 tnts4.m3u8

          if git diff --staged --quiet; then
            echo "Tidak ada perubahan file m3u8"
          else
            git commit -m "Update TNT Sports playlists"
            git push
          fi
